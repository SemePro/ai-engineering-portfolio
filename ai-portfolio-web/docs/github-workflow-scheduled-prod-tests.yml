# Copy to: .github/workflows/scheduled-prod-tests.yml
# (Some PATs cannot push workflow files; add via GitHub UI or token with `workflow` scope.)
name: Scheduled prod smoke & report

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: scheduled-prod-tests
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  smoke-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ai-portfolio-web/package-lock.json

      - name: Install dependencies
        run: cd ai-portfolio-web && npm ci

      - name: Install Playwright Chromium
        run: cd ai-portfolio-web && npx playwright install chromium --with-deps

      - name: Playwright prod smoke (@prod-safe)
        working-directory: ai-portfolio-web
        run: |
          mkdir -p test-results
          set +e
          npx playwright test -c playwright.scheduled.config.ts
          echo $? > test-results/pw-exit.txt
          set -e

      # CI_REPORT_JUNIT=1 → cypress.config.ts writes test-results/cypress-junit.xml (report breakdown)
      - name: Cypress prod smoke
        working-directory: ai-portfolio-web
        env:
          CI_REPORT_JUNIT: "1"
          TEST_BASE_URL: https://www.semefit.com
        run: |
          mkdir -p test-results
          set +e
          npx cypress run --spec "cypress/e2e/prod-smoke/**/*.cy.ts"
          echo $? > test-results/cypress-exit.txt
          set -e

      - name: Build test report JSON
        if: always()
        working-directory: ai-portfolio-web
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/ci/build-test-report.mjs

      - name: Commit and push report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai-portfolio-web/public/test-report/latest.json
          git add ai-portfolio-web/public/test-report/history/
          if git diff --staged --quiet; then
            echo "No changes to report"
          else
            git commit -m "chore(test-report): nightly prod smoke $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push
          fi

      - name: Fail if smoke tests did not pass
        if: always()
        working-directory: ai-portfolio-web
        run: |
          node -e "
            const fs = require('fs');
            const p = 'public/test-report/latest.json';
            if (!fs.existsSync(p)) { console.error('Missing report'); process.exit(1); }
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            if (j.overallOk !== true) {
              console.error('overallOk is false — see Playwright/Cypress steps and latest.json');
              process.exit(1);
            }
            console.log('All smoke checks passed (overallOk=true)');
          "
